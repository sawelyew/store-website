<!DOCTYPE html>
{% load static %}
{% load socialaccount %}
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <title>{{ title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <link rel="stylesheet" href="{% static 'vendor/css/login.css' %}">
</head>

<body>

<div class="auth-card">
    <a href="{% url 'index' %}" class="auth-logo">STORE<span>.</span></a>

    <h4 class="text-center fw-bold mb-4">С возвращением!</h4>

    <form method="post">
        {% csrf_token %}

        {% if form.non_field_errors %}
            <div class="alert alert-danger py-2 small" style="border-radius: 10px;">
                {{ form.non_field_errors }}
            </div>
        {% endif %}

        <div class="mb-3">
            <label class="form-label">Email пользователя</label>
            {{ form.email }}
        </div>

        <div class="mb-4">
            <div class="d-flex justify-content-between">
                <label class="form-label">Пароль</label>
                <a href="#" class="small text-muted text-decoration-none">Забыли?</a>
            </div>
            {{ form.password }}
        </div>

        <button type="submit" class="btn btn-login">Войти в аккаунт</button>
    </form>

    <div class="divider">или войти через</div>

    <div class="social-login">
        <form action="{% provider_login_url 'google' %}" method="post" style="display: inline;">
            {% csrf_token %}
            <button type="submit" class="social-icon" style="background: none; border: none; padding: 0; cursor: pointer;">
                <i class="fab fa-google"></i>
            </button>
        </form>

        <form action="{% provider_login_url 'github' %}" method="post" style="display: inline;">
            {% csrf_token %}
            <button type="submit" class="social-icon" style="background: none; border: none; padding: 0; cursor: pointer;">
                <i class="fab fa-github"></i>
            </button>
        </form>
    </div>

    <div class="auth-footer">
        Нет аккаунта? <a href="{% url 'users:register' %}">Создать профиль</a>
    </div>
</div>

</body>
</html>
